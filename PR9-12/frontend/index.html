<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Управление товарами</h1>
            <div id="auth-section">
                <div id="user-info"></div>
                <button id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </header>

        <main>
            <div id="guest-view">
                <div class="forms-container">
                    <div class="form-card">
                        <h2>Вход</h2>
                        <form id="login-form">
                            <input type="email" id="login-email" placeholder="Email" required>
                            <input type="password" id="login-password" placeholder="Пароль" required>
                            <button type="submit">Войти</button>
                        </form>
                    </div>
                    
                    <div class="form-card">
                        <h2>Регистрация</h2>
                        <form id="register-form">
                            <input type="email" id="reg-email" placeholder="Email" required>
                            <input type="text" id="reg-firstname" placeholder="Имя" required>
                            <input type="text" id="reg-lastname" placeholder="Фамилия" required>
                            <input type="password" id="reg-password" placeholder="Пароль" required>
                            <button type="submit">Зарегистрироваться</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="app-view" style="display: none;">
                <div class="role-panel" id="role-panel"></div>

                <section class="products-section">
                    <h2>Товары</h2>
                    
                    <div id="seller-actions" style="display: none;">
                        <h3>Добавить товар</h3>
                        <form id="product-form">
                            <input type="text" id="product-title" placeholder="Название" required>
                            <input type="text" id="product-category" placeholder="Категория" required>
                            <textarea id="product-description" placeholder="Описание" required></textarea>
                            <input type="number" id="product-price" placeholder="Цена" required>
                            <button type="submit">Добавить товар</button>
                        </form>
                    </div>

                    <div class="products-list">
                        <h3>Список товаров</h3>
                        <div id="products-container"></div>
                    </div>
                </section>

                <section class="users-section" id="users-section" style="display: none;">
                    <h2>Управление пользователями</h2>
                    <div id="users-container"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
