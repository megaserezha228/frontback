<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4285f4">
  <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Заметки PWA</title>
  <link rel="stylesheet" href="https://unpkg.com/chota@latest">
  <link rel="icon" href="icons/favicon.ico" sizes="16x16" type="image/ico">
</head>
<body>
  <div class="container" style="max-width: 600px; margin-top: 1rem;">
    <header>
      <h1 class="is-center">Мои заметки</h1>
      <nav class="tabs is-center">
        <button id="home-btn" class="tab active col-6">Главная</button>
        <button id="about-btn" class="tab col-6">О приложении</button>
      </nav>
    </header>

    <main id="app-content" style="margin-top: 1rem;">
      <!-- динамический контент -->
    </main>

    <footer class="is-center" style="margin-top: 2rem;">
      <button id="enable-push" class="button success">Включить уведомления</button>
      <button id="disable-push" class="button error" style="display:none;">Отключить уведомления</button>
    </footer>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
